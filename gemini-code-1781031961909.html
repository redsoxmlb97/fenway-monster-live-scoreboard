<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fenway Green Monster Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --text-glow: #ffc44d; --ball-color: #00f3ff; --strike-color: #ff2e2e; --out-color: #ff2e2e; }
        body { background-color: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }

        #scoreboard {
            position: relative; width: 90vw; max-width: 1024px; aspect-ratio: 16 / 9;
            container-type: size; container-name: score-board; overflow: hidden;
            background-color: #2b4436; background-image: url('green-monster-bg.jpg');
            background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
        }

        #away-team-name, #home-team-overlay-plate {
            width: 16cqw; height: 4cqw; display: inline-flex; align-items: center; justify-content: center;
            white-space: nowrap; background-color: #1e3327;
            box-shadow: inset 0 0 0.5cqw rgba(0,0,0,0.8), 0 0.1cqw 0.2cqw rgba(255,255,255,0.1);
            color: #fff; font-family: 'Overpass', sans-serif; font-weight: 800; font-size: 3cqw;
            position: absolute; text-transform: uppercase;
        }

        /* Line Score Grid */
        .line-score-grid { position: absolute; top: 35.99%; left: 27.7%; width: 60.5%; display: flex; flex-direction: column; gap: .5cqw; }
        .line-score-grid .row { 
            display: grid; 
            grid-template-columns: 3.6cqw 3.9cqw 4.6cqw 2cqw 3.9cqw 3.99cqw 3.9cqw 2.4cqw 3.9cqw 4cqw 3.8cqw 2.3cqw 3.8cqw 4.6cqw 3.4cqw 9.3cqw 3.5cqw;
            justify-items: center; align-items: center; 
        }
        .line-score-grid .inn, .line-score-grid .stat { font-size: 4cqw; display: inline-flex; align-items: center; justify-content: center; width: 100%; height: 100%; color: #fff; }
        .line-score-grid .inn.live-scoring { color: #FFD500 !important; }
        
        /* Add other components (dot-matrix, count-block, etc) here as per original file */
    </style>
</head>
<body>
    <div id="scoreboard">
        </div>
